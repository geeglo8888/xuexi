<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KodBox 网页桌面</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-logo">kod</div>
    <div class="sidebar-nav">
      <button class="sidebar-item active" data-view="video">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="4" width="20" height="16" rx="2"></rect>
          <polygon points="10 9 15 12 10 15 10 9" fill="currentColor"></polygon>
        </svg>
        <span>视频</span>
      </button>
      <button class="sidebar-item" data-view="audio">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 18V5l12-2v13"></path>
          <circle cx="6" cy="18" r="3"></circle>
          <circle cx="18" cy="16" r="3"></circle>
        </svg>
        <span>音频</span>
      </button>
      <button class="sidebar-item" data-view="photo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"></rect>
          <circle cx="8.5" cy="8.5" r="1.5"></circle>
          <polyline points="21 15 16 10 5 21"></polyline>
        </svg>
        <span>图片</span>
      </button>
      <button class="sidebar-item" data-view="files">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
        </svg>
        <span>文件管理</span>
      </button>
      <button class="sidebar-item" data-view="website">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="2" y1="12" x2="22" y2="12"></line>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
        </svg>
        <span>官网</span>
      </button>
    </div>
    <div class="sidebar-user">
      <div class="user-avatar" id="userAvatarBtn">
        <svg viewBox="0 0 24 24">
          <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
      </div>
      <div class="user-menu" id="userMenu">
        <div class="user-menu-header">
          <div class="avatar"></div>
          <div class="info">
            <div class="name">系统管理员</div>
            <div class="role">admin</div>
          </div>
        </div>
        <button class="user-menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span class="label">账号中心</span></button>
        <button class="user-menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg><span class="label">文件管理</span></button>
        <button class="user-menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg><span class="label">后台管理</span></button>
        <button class="user-menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 1-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg><span class="label">用户管理</span></button>
        <button class="user-menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13.5 2H6a2 2 0 0 0-2 2v16c0 1.1.9 2 2 2h12a2 2 0 0 0 2-2V8.5L13.5 2z"></path><path d="M10 8.5V15h4"></path></svg><span class="label">插件管理</span></button>
        <div class="user-menu-divider"></div>
        <button class="user-menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg><span class="label">多语言</span><span class="suffix">(language)</span></button>
        <button class="user-menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="13.5" cy="6.5" r="0.5"></circle><circle cx="17.5" cy="10.5" r="0.5"></circle><circle cx="8.5" cy="7.5" r="0.5"></circle><circle cx="6.5" cy="12.5" r="0.5"></circle><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.555C21.965 6.012 17.461 2 12 2z"></path></svg><span class="label">主题样式</span><span class="suffix">自动</span></button>
        <button class="user-menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg><span class="label">全屏</span></button>
        <button class="user-menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg><span class="label">关于</span></button>
        <div class="user-menu-divider"></div>
        <button class="user-menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg><span class="label">客户端下载</span></button>
        <button class="user-menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg><span class="label">免费版</span></button>
        <div class="user-menu-divider"></div>
        <button class="user-menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg><span class="label">退出</span></button>
      </div>
    </div>
  </div>

  <div class="main-content">
    <!-- 视频页面 -->
    <div class="view video-view active" id="videoView">
      <div class="content-header">
        <h2>视频</h2>
        <div class="header-actions">
          <button class="upload-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            上传视频
          </button>
        </div>
      </div>
      <div class="file-grid">
        <div class="file-item" data-video="assets/video/high.mp4">
          <div class="file-icon video-icon">
            <svg viewBox="0 0 48 48">
              <rect x="4" y="8" width="40" height="32" rx="4" fill="#1e1e1e"></rect>
              <polygon points="20 16 32 24 20 32" fill="#4a90d9"></polygon>
            </svg>
          </div>
          <span class="file-name">high.mp4</span>
          <span class="file-size">-- MB</span>
        </div>
        <div class="file-item" data-video="assets/video/北京一夜 - 陈升.mp4">
          <div class="file-icon video-icon">
            <svg viewBox="0 0 48 48">
              <rect x="4" y="8" width="40" height="32" rx="4" fill="#1e1e1e"></rect>
              <polygon points="20 16 32 24 20 32" fill="#4a90d9"></polygon>
            </svg>
          </div>
          <span class="file-name">北京一夜 - 陈升.mp4</span>
          <span class="file-size">-- MB</span>
        </div>
      </div>
    </div>

    <!-- 音频页面 -->
    <div class="view audio-view" id="audioView">
      <div class="content-header">
        <h2>音频</h2>
        <div class="header-actions">
          <button class="upload-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            上传音频
          </button>
        </div>
      </div>
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="64" height="64">
          <path d="M9 18V5l12-2v13"></path>
          <circle cx="6" cy="18" r="3"></circle>
          <circle cx="18" cy="16" r="3"></circle>
        </svg>
        <p>暂无音频文件</p>
      </div>
    </div>

    <!-- 图片页面 -->
    <div class="view photo-view" id="photoView">
      <div class="content-header">
        <h2>图片</h2>
        <div class="header-actions">
          <button class="upload-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            上传图片
          </button>
        </div>
      </div>
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="64" height="64">
          <rect x="3" y="3" width="18" height="18" rx="2"></rect>
          <circle cx="8.5" cy="8.5" r="1.5"></circle>
          <polyline points="21 15 16 10 5 21"></polyline>
        </svg>
        <p>暂无图片文件</p>
      </div>
    </div>

    <!-- 文件管理页面 -->
    <div class="view files-view" id="filesView">
      <div class="content-header">
        <h2>文件管理</h2>
        <div class="header-actions">
          <button class="action-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
              <line x1="12" y1="11" x2="12" y2="17"></line>
              <line x1="9" y1="14" x2="15" y2="14"></line>
            </svg>
            新建文件夹
          </button>
          <button class="upload-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            上传文件
          </button>
        </div>
      </div>
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="64" height="64">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
        </svg>
        <p>暂无文件</p>
      </div>
    </div>

    <!-- 官网页面 -->
    <div class="view website-view" id="websiteView">
      <div class="website-content">
        <div class="website-logo">kodcloud</div>
        <div class="website-tagline">高效，流畅</div>
        <div class="website-title">云端存储&协同办公</div>
        <div class="website-desc">数千项细节精心优化，带给您Windows桌面般的体验，随时随地访问</div>
        <div class="website-buttons">
          <button class="website-btn outline">预约演示</button>
          <button class="website-btn filled">体验DEMO</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 视频播放器弹窗已移除,改为新标签页播放 -->

<script src="utils/clock.js"></script>
<script src="components/menu.js"></script>
<script src="views/video.js"></script>
<script src="views/audio.js"></script>
<script src="views/image.js"></script>
<script src="views/explorer.js"></script>
<script src="views/website.js"></script>
<script src="script.js"></script>
</body>
</html>
