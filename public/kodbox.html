<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KodBox 网页桌面</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    .app {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* Sidebar */
    .sidebar {
      width: 64px;
      background: #2a5a8a;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0;
      flex-shrink: 0;
    }

    .sidebar-logo {
      color: white;
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 24px;
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .sidebar-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px;
      border-radius: 8px;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.8);
      background: transparent;
      border: none;
      width: 56px;
      transition: all 0.2s;
    }

    .sidebar-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .sidebar-item.active {
      background: #4a8ac9;
      color: white;
    }

    .sidebar-item svg {
      width: 20px;
      height: 20px;
    }

    .sidebar-item span {
      font-size: 10px;
    }

    .sidebar-user {
      margin-top: auto;
      position: relative;
    }

    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f59e0b, #f97316);
      border: 2px solid rgba(255, 255, 255, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .user-avatar svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    /* Main Content */
    .main-content {
      flex: 1;
      position: relative;
    }

    /* Views */
    .view {
      display: none;
      width: 100%;
      height: 100%;
    }

    .view.active {
      display: flex;
    }

    /* Desktop View */
    .desktop-view {
      background: linear-gradient(to bottom, #5a8fc2 0%, #8eb4d9 40%, #b8d4e8 60%, #d4e4ef 75%, #e8eff4 85%, #f0f4f7 100%);
      position: relative;
      overflow: hidden;
    }

    .mountains {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 30%;
      background: 
        linear-gradient(135deg, transparent 40%, #e8eff4 40%, #f5f8fa 45%, #fff 50%, #f0f4f7 55%, #dde8ef 60%, transparent 60%),
        linear-gradient(125deg, transparent 35%, #d4e4ef 35%, #e8eff4 42%, #fff 48%, #f5f8fa 52%, #e0eaf0 58%, transparent 58%),
        linear-gradient(140deg, transparent 45%, #ccdee8 45%, #dde8ef 50%, #f0f4f7 55%, #fff 58%, #e8eff4 62%, transparent 62%);
      background-size: 50% 100%, 40% 100%, 60% 100%;
      background-position: 0% 100%, 30% 100%, 70% 100%;
      background-repeat: no-repeat;
    }

    /* Desktop Icons */
    .desktop-icons {
      position: absolute;
      left: 32px;
      top: 32px;
      display: grid;
      grid-auto-flow: column;
      grid-template-rows: repeat(5, 1fr);
      gap: 8px 16px;
    }

    .desktop-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 4px;
      padding: 8px;
      border-radius: 8px;
      width: 72px;
      height: 88px;
      cursor: pointer;
      background: transparent;
      border: none;
      transition: all 0.2s;
      position: relative;
    }

    .desktop-icon:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .desktop-icon.selected {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(4px);
    }

    .desktop-icon .check {
      display: none;
      position: absolute;
      top: 4px;
      left: 4px;
      width: 20px;
      height: 20px;
      background: #3b82f6;
      border-radius: 50%;
      align-items: center;
      justify-content: center;
    }

    .desktop-icon.selected .check {
      display: flex;
    }

    .desktop-icon .check svg {
      width: 14px;
      height: 14px;
      stroke: white;
      stroke-width: 3;
      fill: none;
    }

    .desktop-icon .icon-img {
      width: 56px;
      height: 56px;
      flex-shrink: 0;
    }

    .desktop-icon .icon-img svg {
      width: 100%;
      height: 100%;
    }

    .desktop-icon .icon-label {
      color: white;
      font-size: 11px;
      text-align: center;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
      line-height: 1.2;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    /* Clock */
    .clock-widget {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 128px;
      height: 128px;
    }

    /* Context Menu */
    .context-menu {
      display: none;
      position: fixed;
      background: white;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      border: 1px solid #e5e7eb;
      padding: 8px 0;
      min-width: 200px;
      z-index: 1000;
    }

    .context-menu.show {
      display: block;
    }

    .context-menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 12px;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .context-menu-item:hover {
      background: #eff6ff;
    }

    .context-menu-item .icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #3b82f6;
    }

    .context-menu-item .icon svg {
      width: 16px;
      height: 16px;
    }

    .context-menu-item .label {
      flex: 1;
      font-size: 14px;
      color: #374151;
    }

    .context-menu-item .label .key {
      color: #9ca3af;
    }

    .context-menu-item .shortcut {
      font-size: 12px;
      color: #9ca3af;
    }

    .context-menu-item .arrow {
      color: #9ca3af;
    }

    .context-menu-divider {
      height: 1px;
      background: #f3f4f6;
      margin: 4px 0;
    }

    /* Icon Context Menu */
    .icon-context-menu {
      min-width: 180px;
    }

    /* User Menu */
    .user-menu {
      display: none;
      position: absolute;
      bottom: 100%;
      left: 0;
      margin-bottom: 8px;
      width: 224px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      border: 1px solid #e5e7eb;
      padding: 8px 0;
      z-index: 1000;
    }

    .user-menu.show {
      display: block;
    }

    .user-menu-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid #f3f4f6;
    }

    .user-menu-header .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f59e0b, #f97316);
    }

    .user-menu-header .info .name {
      font-weight: 500;
      color: #1f2937;
    }

    .user-menu-header .info .role {
      font-size: 12px;
      color: #9ca3af;
    }

    .user-menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .user-menu-item:hover {
      background: #eff6ff;
    }

    .user-menu-item svg {
      width: 16px;
      height: 16px;
      color: #6b7280;
    }

    .user-menu-item .label {
      flex: 1;
      font-size: 14px;
      color: #374151;
    }

    .user-menu-item .suffix {
      font-size: 12px;
      color: #9ca3af;
    }

    .user-menu-divider {
      height: 1px;
      background: #f3f4f6;
      margin: 4px 0;
    }

    /* Explorer View */
    .explorer-view {
      background: white;
    }

    .explorer-sidebar {
      width: 224px;
      border-right: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
    }

    .explorer-tree {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .tree-section {
      margin-bottom: 8px;
    }

    .tree-section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 8px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 14px;
      color: #4b5563;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .tree-section-header:hover {
      background: #eff6ff;
    }

    .tree-section-header svg {
      width: 12px;
      height: 12px;
    }

    .tree-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 8px;
      padding-left: 24px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 14px;
      color: #374151;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .tree-item:hover {
      background: #eff6ff;
    }

    .tree-item svg {
      width: 16px;
      height: 16px;
    }

    .tree-item.level-2 {
      padding-left: 40px;
    }

    .explorer-footer {
      border-top: 1px solid #e5e7eb;
      padding: 8px;
      font-size: 12px;
      color: #3b82f6;
    }

    .explorer-main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .explorer-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border-bottom: 1px solid #e5e7eb;
    }

    .toolbar-nav {
      display: flex;
      gap: 4px;
    }

    .toolbar-btn {
      padding: 4px;
      border-radius: 4px;
      border: none;
      background: none;
      cursor: pointer;
      color: #9ca3af;
    }

    .toolbar-btn:hover {
      background: #f3f4f6;
    }

    .toolbar-btn svg {
      width: 16px;
      height: 16px;
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      background: #f9fafb;
      border-radius: 4px;
      font-size: 14px;
      color: #4b5563;
    }

    .breadcrumb svg {
      width: 16px;
      height: 16px;
    }

    .breadcrumb .separator {
      width: 12px;
      height: 12px;
      color: #9ca3af;
    }

    .toolbar-spacer {
      flex: 1;
    }

    .toolbar-action {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }

    .toolbar-action svg {
      width: 16px;
      height: 16px;
    }

    .toolbar-action.primary {
      background: #3b82f6;
      color: white;
    }

    .toolbar-action.primary:hover {
      background: #2563eb;
    }

    .toolbar-action.secondary {
      background: #fef3c7;
      color: #d97706;
    }

    .toolbar-action.secondary:hover {
      background: #fde68a;
    }

    .file-grid {
      flex: 1;
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 16px;
      align-content: start;
    }

    .file-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px;
      border-radius: 8px;
      cursor: pointer;
    }

    .file-item:hover {
      background: #eff6ff;
    }

    .file-item .file-icon {
      width: 64px;
      height: 64px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .file-item .file-icon svg {
      width: 48px;
      height: 48px;
    }

    .file-item .file-name {
      font-size: 14px;
      color: #374151;
    }

    .explorer-status {
      border-top: 1px solid #e5e7eb;
      padding: 8px 16px;
      font-size: 14px;
      color: #6b7280;
    }

    /* Website View */
    .website-view {
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .website-logo {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 48px;
    }

    .website-tagline {
      font-size: 24px;
      margin-bottom: 16px;
    }

    .website-title {
      font-size: 36px;
      font-weight: bold;
      margin-bottom: 24px;
    }

    .website-desc {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 48px;
    }

    .website-buttons {
      display: flex;
      gap: 16px;
    }

    .website-btn {
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      border: none;
    }

    .website-btn.outline {
      background: transparent;
      border: 1px solid white;
      color: white;
    }

    .website-btn.filled {
      background: white;
      color: #3b82f6;
    }

    /* Adminer View */
    .adminer-view {
      background: #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-logo">kod</div>
      <div class="sidebar-nav">
        <button class="sidebar-item active" data-view="desktop">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
            <line x1="8" y1="21" x2="16" y2="21"></line>
            <line x1="12" y1="17" x2="12" y2="21"></line>
          </svg>
          <span>桌面</span>
        </button>
        <button class="sidebar-item" data-view="explorer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
          </svg>
          <span>文件管理</span>
        </button>
        <button class="sidebar-item" data-view="website">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          <span>官网</span>
        </button>
        <button class="sidebar-item" data-view="adminer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
            <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
            <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
          </svg>
          <span>Adminer</span>
        </button>
      </div>
      <div class="sidebar-user">
        <div class="user-avatar" id="userAvatarBtn">
          <svg viewBox="0 0 24 24">
            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
          </svg>
        </div>
        <!-- User Menu -->
        <div class="user-menu" id="userMenu">
          <div class="user-menu-header">
            <div class="avatar"></div>
            <div class="info">
              <div class="name">系统管理员</div>
              <div class="role">admin</div>
            </div>
          </div>
          <button class="user-menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span class="label">账号中心</span></button>
          <button class="user-menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg><span class="label">文件管理</span></button>
          <button class="user-menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg><span class="label">后台管理</span></button>
          <button class="user-menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg><span class="label">用户管理</span></button>
          <button class="user-menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13.5 2H6a2 2 0 0 0-2 2v16c0 1.1.9 2 2 2h12a2 2 0 0 0 2-2V8.5L13.5 2z"></path><path d="M10 8.5V15h4"></path></svg><span class="label">插件管理</span></button>
          <div class="user-menu-divider"></div>
          <button class="user-menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg><span class="label">多语言</span><span class="suffix">(language)</span></button>
          <button class="user-menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="13.5" cy="6.5" r="0.5"></circle><circle cx="17.5" cy="10.5" r="0.5"></circle><circle cx="8.5" cy="7.5" r="0.5"></circle><circle cx="6.5" cy="12.5" r="0.5"></circle><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.555C21.965 6.012 17.461 2 12 2z"></path></svg><span class="label">主题样式</span><span class="suffix">自动</span></button>
          <button class="user-menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg><span class="label">全屏</span></button>
          <button class="user-menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg><span class="label">关于</span></button>
          <div class="user-menu-divider"></div>
          <button class="user-menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg><span class="label">客户端下载</span></button>
          <button class="user-menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg><span class="label">免费版</span></button>
          <div class="user-menu-divider"></div>
          <button class="user-menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg><span class="label">退出</span></button>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Desktop View -->
      <div class="view desktop-view active" id="desktopView">
        <div class="mountains"></div>
        <div class="desktop-icons" id="desktopIcons"></div>
        <div class="clock-widget">
          <svg viewBox="0 0 100 100" id="clockSvg"></svg>
        </div>
      </div>

      <!-- Explorer View -->
      <div class="view explorer-view" id="explorerView">
        <div class="explorer-sidebar">
          <div class="explorer-tree">
            <div class="tree-section">
              <button class="tree-section-header">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>

      // Add event listeners
      desktopIconsContainer.querySelectorAll('.desktop-icon').forEach((iconEl, index) => {
        iconEl.addEventListener('click', (e) => {
          e.stopPropagation();
          selectIcon(index);
          hideAllMenus();
        });

        iconEl.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          e.stopPropagation();
          selectIcon(index);
          showIconContextMenu(e.clientX, e.clientY);
        });
      });
    }

    // Select icon
    function selectIcon(index) {
      selectedIconIndex = index;
      document.querySelectorAll('.desktop-icon').forEach((el, i) => {
        el.classList.toggle('selected', i === index);
      });
    }

    // Clear selection
    function clearSelection() {
      selectedIconIndex = null;
      document.querySelectorAll('.desktop-icon').forEach(el => {
        el.classList.remove('selected');
      });
    }

    // Show desktop context menu
    function showDesktopContextMenu(x, y) {
      hideAllMenus();
      const menu = desktopContextMenu;
      const adjustedX = Math.min(x, window.innerWidth - 220);
      const adjustedY = Math.min(y, window.innerHeight - 400);
      menu.style.left = adjustedX + 'px';
      menu.style.top = adjustedY + 'px';
      menu.classList.add('show');
    }

    // Show icon context menu
    function showIconContextMenu(x, y) {
      hideAllMenus();
      const menu = iconContextMenu;
      const adjustedX = Math.min(x, window.innerWidth - 200);
      const adjustedY = Math.min(y, window.innerHeight - 100);
      menu.style.left = adjustedX + 'px';
      menu.style.top = adjustedY + 'px';
      menu.classList.add('show');
    }

    // Hide all menus
    function hideAllMenus() {
      desktopContextMenu.classList.remove('show');
      iconContextMenu.classList.remove('show');
      userMenu.classList.remove('show');
    }

    // Switch view
    function switchView(view) {
      currentView = view;
      window.location.hash = view;

      sidebarItems.forEach(item => {
        item.classList.toggle('active', item.dataset.view === view);
      });

      views.forEach(v => {
        v.classList.toggle('active', v.id === view + 'View');
      });

      hideAllMenus();
      clearSelection();
    }

    // Update clock
    function updateClock() {
      const now = new Date();
      const seconds = now.getSeconds();
      const minutes = now.getMinutes();
      const hours = now.getHours() % 12;

      const secondDeg = (seconds / 60) * 360;
      const minuteDeg = (minutes / 60) * 360 + (seconds / 60) * 6;
      const hourDeg = (hours / 12) * 360 + (minutes / 60) * 30;

      let clockHtml = '';

      // Hour markers and numbers
      for (let i = 0; i < 12; i++) {
        const angle = (i * 30 - 90) * (Math.PI / 180);
        const x1 = 50 + 38 * Math.cos(angle);
        const y1 = 50 + 38 * Math.sin(angle);
        const x2 = 50 + 45 * Math.cos(angle);
        const y2 = 50 + 45 * Math.sin(angle);
        const textX = 50 + 32 * Math.cos(angle);
        const textY = 50 + 32 * Math.sin(angle);
        const num = i === 0 ? 12 : i;

        clockHtml += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="white" stroke-width="1" opacity="0.7"/>`;
        clockHtml += `<text x="${textX}" y="${textY}" text-anchor="middle" dominant-baseline="middle" fill="white" font-size="8" opacity="0.9">${num}</text>`;
      }

      // Minute markers
      for (let i = 0; i < 60; i++) {
        if (i % 5 === 0) continue;
        const angle = (i * 6 - 90) * (Math.PI / 180);
        const x1 = 50 + 42 * Math.cos(angle);
        const y1 = 50 + 42 * Math.sin(angle);
        const x2 = 50 + 45 * Math.cos(angle);
        const y2 = 50 + 45 * Math.sin(angle);
        clockHtml += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="white" stroke-width="0.5" opacity="0.5"/>`;
      }

      // Hands
      clockHtml += `<line x1="50" y1="50" x2="50" y2="28" stroke="white" stroke-width="2.5" stroke-linecap="round" transform="rotate(${hourDeg} 50 50)"/>`;
      clockHtml += `<line x1="50" y1="50" x2="50" y2="18" stroke="white" stroke-width="1.5" stroke-linecap="round" transform="rotate(${minuteDeg} 50 50)"/>`;
      clockHtml += `<line x1="50" y1="50" x2="50" y2="15" stroke="#ff6b35" stroke-width="1" stroke-linecap="round" transform="rotate(${secondDeg} 50 50)"/>`;
      clockHtml += `<circle cx="50" cy="50" r="2" fill="white"/>`;

      clockSvg.innerHTML = clockHtml;
    }

    // Event listeners
    sidebarItems.forEach(item => {
      item.addEventListener('click', () => switchView(item.dataset.view));
    });

    desktopView.addEventListener('click', (e) => {
      if (e.target === desktopView || e.target.classList.contains('mountains')) {
        clearSelection();
        hideAllMenus();
      }
    });

    desktopView.addEventListener('contextmenu', (e) => {
      if (e.target === desktopView || e.target.classList.contains('mountains')) {
        e.preventDefault();
        clearSelection();
        showDesktopContextMenu(e.clientX, e.clientY);
      }
    });

    userAvatarBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      userMenu.classList.toggle('show');
    });

    document.addEventListener('click', () => {
      hideAllMenus();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        hideAllMenus();
        clearSelection();
      }
    });

    // Handle hash change
    function handleHashChange() {
      const hash = window.location.hash.slice(1) || 'desktop';
      if (['desktop', 'explorer', 'website', 'adminer'].includes(hash)) {
        switchView(hash);
      }
    }

    window.addEventListener('hashchange', handleHashChange);

    // Context menu items click
    document.querySelectorAll('.context-menu-item').forEach(item => {
      item.addEventListener('click', () => hideAllMenus());
    });

    // Initialize
    renderDesktopIcons();
    updateClock();
    setInterval(updateClock, 1000);
    handleHashChange();
  </script>
</body>
</html>
